<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePlate — オフライン版</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface2: #f3ede3;
    --border: #e8dfd0;
    --ink: #1a1410;
    --ink2: #6b5f52;
    --accent: #c8522a;
    --accent2: #e8a045;
    --safe: #3a7d5c;
    --tag-bg: #fdebd8;
    --tag-border: #f0c9a0;
    --r: 16px;
    --shadow: 0 4px 24px rgba(26,20,16,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  header {
    background: var(--ink); color: var(--bg);
    padding: 20px 32px; display: flex; align-items: center; gap: 16px;
  }
  .logo { font-family: 'Kaisei Decol', serif; font-size: 26px; font-weight: 700; line-height: 1; }
  .logo span { color: var(--accent2); }
  header p { font-size: 12px; color: rgba(250,247,242,0.5); margin-top: 3px; }

  .app {
    max-width: 1060px; margin: 0 auto; padding: 32px 20px 80px;
    display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start;
  }
  @media(max-width:700px) { .app { grid-template-columns:1fr; padding:16px 14px 60px; } header { padding:14px 18px; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
  .panel-header {
    background: var(--surface2); padding: 12px 18px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--ink2); text-transform: uppercase;
  }
  .panel-body { padding: 18px; }

  .cat-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--ink2); text-transform: uppercase; margin: 14px 0 8px; }
  .cat-title:first-child { margin-top: 0; }

  .allergen-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .a-chip { position: relative; }
  .a-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
  .a-chip label {
    display: flex; align-items: center; gap: 4px; padding: 5px 10px;
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 999px;
    font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .a-chip label:hover { border-color: var(--accent); }
  .a-chip input:checked + label { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

  .mood-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 10px 0 14px; }
  .mood-btn {
    padding: 6px 13px; border-radius: 999px; border: 1.5px solid var(--border);
    background: var(--surface2); font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s; color: var(--ink2);
  }
  .mood-btn.active { background: var(--ink); border-color: var(--ink); color: white; font-weight: 700; }
  .mood-btn:hover:not(.active) { border-color: var(--ink); color: var(--ink); }

  .gen-btn {
    width: 100%; padding: 13px; background: var(--accent); color: white; border: none;
    border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.15s, transform 0.1s; letter-spacing: 0.03em;
  }
  .gen-btn:hover { background: #a83e1e; }
  .gen-btn:active { transform: scale(0.98); }

  .count-bar { font-size: 11px; color: var(--ink2); margin: 10px 0 14px; text-align: right; }
  .count-bar strong { color: var(--accent); }

  /* Result */
  .right-col { display: flex; flex-direction: column; gap: 0; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--ink2); text-align: center; gap: 12px;
  }
  .empty-icon { font-size: 48px; opacity: 0.35; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  /* Recipe grid */
  .results-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px;
    padding: 18px;
  }

  .recipe-card-thumb {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 16px; cursor: pointer; transition: all 0.2s;
  }
  .recipe-card-thumb:hover { border-color: var(--accent); box-shadow: 0 4px 18px rgba(200,82,42,0.12); transform: translateY(-2px); }
  .recipe-card-thumb .emoji { font-size: 32px; margin-bottom: 10px; display: block; }
  .recipe-card-thumb h3 { font-family: 'Kaisei Decol', serif; font-size: 17px; margin-bottom: 6px; }
  .recipe-card-thumb p { font-size: 12px; color: var(--ink2); line-height: 1.6; }
  .thumb-meta { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .thumb-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
    background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--accent);
  }

  .no-result {
    padding: 40px 20px; text-align: center; color: var(--ink2); font-size: 14px; line-height: 1.8;
  }

  /* Detail view */
  .detail-view { padding: 20px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-bottom: 18px;
    padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--border);
    background: transparent; font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    color: var(--ink2); cursor: pointer; transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .recipe-title { font-family: 'Kaisei Decol', serif; font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 10px; }
  .recipe-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .meta-badge { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--accent); }
  .meta-badge.safe { background: #e8f5ee; border-color: #a8d5be; color: var(--safe); }
  .recipe-desc { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }

  .section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

  .ingredients-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 22px; }
  .ingredient-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .ingredient-item .amount { font-size: 11px; color: var(--ink2); font-weight: 700; }

  .steps-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
  .step { display: flex; gap: 14px; align-items: flex-start; }
  .step-num { flex-shrink:0; width:30px; height:30px; background: var(--ink); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size:13px; font-weight:700; }
  .step-text { font-size: 14px; line-height: 1.7; padding-top: 4px; }

  .tips-box { background: #fff8ed; border: 1.5px solid var(--tag-border); border-radius: 12px; padding: 14px 16px; font-size: 13px; line-height: 1.7; color: var(--ink2); }
  .tips-box strong { color: var(--accent2); display: block; margin-bottom: 4px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

  .result-count { padding: 10px 18px 0; font-size: 12px; color: var(--ink2); }
  .result-count strong { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Safe<span>Plate</span></div>
    <p>アレルギー対応レシピ — オフライン完全動作・60品以上内蔵</p>
  </div>
</header>

<div class="app">

  <!-- LEFT -->
  <div class="panel">
    <div class="panel-header">⚠️ アレルゲン設定</div>
    <div class="panel-body">
      <p style="font-size:12px;color:var(--ink2);margin-bottom:12px;line-height:1.6;">避けたい食材にチェックを入れてください。</p>

      <div class="cat-title">特定原材料（義務 8品目）</div>
      <div class="allergen-grid" id="mandatory-grid"></div>

      <div class="cat-title">準ずるもの（20品目）</div>
      <div class="allergen-grid" id="advisory-grid"></div>

      <div class="count-bar" id="countBar">選択中: <strong>0</strong> / 28</div>

      <div class="cat-title" style="margin-top:4px;">カテゴリ</div>
      <div class="mood-row" id="moodRow">
        <button class="mood-btn active" data-mood="すべて">🍽 すべて</button>
        <button class="mood-btn" data-mood="和食">🍱 和食</button>
        <button class="mood-btn" data-mood="洋食">🍝 洋食</button>
        <button class="mood-btn" data-mood="中華">🥢 中華</button>
        <button class="mood-btn" data-mood="スープ">🍲 スープ</button>
        <button class="mood-btn" data-mood="スイーツ">🍰 スイーツ</button>
      </div>

      <button class="gen-btn" onclick="searchRecipes()">🔍 レシピを探す</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-col">
    <div class="panel" id="resultPanel">
      <div class="panel-header">📖 レシピ一覧</div>
      <div id="resultBody">
        <div class="empty-state">
          <div class="empty-icon">🥘</div>
          <p>アレルゲンを設定して<br>「レシピを探す」を押してください。</p>
        </div>
      </div>
    </div>
  </div>

</div>

      '味噌を溶かし入れて5分煮詰めて完成。'
    ],
    tip: '煮汁をとろみがつくまで煮詰めるのがポイントです。'
  },
];

// =====================
// UI
// =====================
let selectedAllergens = new Set();
let selectedMood = 'すべて';
let filteredRecipes = [];

// Render chips
ALLERGENS.forEach(a => {
  const chip = document.createElement('div');
  chip.className = 'a-chip';
  chip.innerHTML = `<input type="checkbox" id="a_${a.key}" onchange="toggleA('${a.key}')"><label for="a_${a.key}">${a.emoji} ${a.label}</label>`;
  (a.mandatory ? document.getElementById('mandatory-grid') : document.getElementById('advisory-grid')).appendChild(chip);
});

function toggleA(key) {
  selectedAllergens.has(key) ? selectedAllergens.delete(key) : selectedAllergens.add(key);
  document.getElementById('countBar').innerHTML = `選択中: <strong>${selectedAllergens.size}</strong> / 28`;
}

document.getElementById('moodRow').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMood = btn.dataset.mood;
});

function searchRecipes() {
  filteredRecipes = RECIPES.filter(r => {
    const noAllergen = r.allergens.every(a => !selectedAllergens.has(a));
    const moodOk = selectedMood === 'すべて' || r.category === selectedMood;
    return noAllergen && moodOk;
  });
  renderGrid();
}

function renderGrid() {
  const body = document.getElementById('resultBody');
  if (filteredRecipes.length === 0) {
    body.innerHTML = `<div class="no-result">😔 条件に合うレシピが見つかりませんでした。<br>アレルゲンの設定を見直してみてください。</div>`;
    return;
  }
  body.innerHTML = `<div class="result-count">見つかったレシピ: <strong>${filteredRecipes.length}件</strong></div>
    <div class="results-grid">
      ${filteredRecipes.map(r => `
        <div class="recipe-card-thumb" onclick="showDetail(${r.id})">
          <span class="emoji">${r.emoji}</span>
          <h3>${r.title}</h3>
          <p>${r.desc}</p>
          <div class="thumb-meta">
            <span class="thumb-badge">⏱ ${r.time}</span>
            <span class="thumb-badge">🔥 ${r.difficulty}</span>
            <span class="thumb-badge">${r.category}</span>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function showDetail(id) {
  const r = RECIPES.find(x => x.id === id);
  if (!r) return;
  const body = document.getElementById('resultBody');
  body.innerHTML = `
    <div class="detail-view">
      <button class="back-btn" onclick="renderGrid()">← 一覧に戻る</button>
      <div style="font-size:40px;margin-bottom:10px;">${r.emoji}</div>
      <div class="recipe-title">${r.title}</div>
      <div class="recipe-meta">
        <span class="meta-badge">⏱ ${r.time}</span>
        <span class="meta-badge">👥 ${r.servings}</span>
        <span class="meta-badge">🔥 ${r.difficulty}</span>
        <span class="meta-badge safe">✅ アレルゲン対応済み</span>
      </div>
      <div class="recipe-desc">${r.desc}</div>

      <div class="section-title">材料</div>
      <div class="ingredients-list">
        ${r.ingredients.map(i => `<div class="ingredient-item"><span>${i.name}</span><span class="amount">${i.amount}</span></div>`).join('')}
      </div>

      <div class="section-title">作り方</div>
      <div class="steps-list">
        ${r.steps.map((s, i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}
      </div>

      <div class="section-title">ポイント</div>
      <div class="tips-box"><strong>💡 Tip</strong>${r.tip}</div>

      <button class="back-btn" style="margin-top:20px;" onclick="renderGrid()">← 一覧に戻る</button>
    </div>
  `;
  document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
